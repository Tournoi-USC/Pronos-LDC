<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script>
(function(){
  var reset=new URLSearchParams(location.search).get('reset');
  if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(sw){sw.unregister();});});}
  if('caches' in window){caches.keys().then(function(k){k.forEach(function(c){caches.delete(c);});});}
  if(reset){var cleanUrl=location.pathname+(location.search.replace(/[?&]?reset=1/,'')||'');history.replaceState(null,'',cleanUrl||location.pathname);}
})();
</script>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prono LDC 26/27</title>
<meta name="theme-color" content="#1a56db">
<meta name="mobile-web-app-capable" content="yes">
<style>
@font-face{font-family:'Exo 2';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/exo-2-400.woff2') format('woff2')}
@font-face{font-family:'Exo 2';font-style:normal;font-weight:600;font-display:swap;src:url('fonts/exo-2-600.woff2') format('woff2')}
@font-face{font-family:'Exo 2';font-style:normal;font-weight:700;font-display:swap;src:url('fonts/exo-2-700.woff2') format('woff2')}
@font-face{font-family:'Exo 2';font-style:normal;font-weight:800;font-display:swap;src:url('fonts/exo-2-800.woff2') format('woff2')}
@font-face{font-family:'Exo 2';font-style:normal;font-weight:900;font-display:swap;src:url('fonts/exo-2-900.woff2') format('woff2')}
</style>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{overflow-x:hidden}
:root{
  --gold:#1a56db;
  --gold2:#2563eb;
  --bg:#0a0f1e;
  --card:#111827;
  --nav:#080d1a;
  --txt:#f1f5f9;
  --muted:#64748b;
  --bdr:#1e2a3a;
  --grn:#22c55e;
  --red:#ef4444;
  --sw:260px;--ban:0px
}
body{font-family:'Exo 2',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:600;background:var(--bg);color:var(--txt);display:flex;min-height:100vh;padding-top:var(--ban)}
input,button,select,textarea{font-family:inherit}
.admin-banner{position:fixed;top:0;left:0;right:0;height:32px;background:var(--gold);color:#fff;font-size:.78rem;font-weight:800;display:none;align-items:center;justify-content:center;z-index:400;gap:8px}
.admin-banner.on{display:flex}
.sb{width:var(--sw);background:var(--nav);position:fixed;top:var(--ban);left:0;height:calc(100vh - var(--ban));display:flex;flex-direction:column;z-index:100;border-right:1px solid var(--bdr)}
.sb-logo{padding:20px;display:flex;align-items:center;gap:10px;color:var(--gold);font-weight:800;font-size:1.1rem;border-bottom:1px solid var(--bdr);cursor:pointer;user-select:none}
.mtop{display:none;position:fixed;top:var(--ban);left:0;right:0;height:46px;background:var(--nav);border-bottom:1px solid var(--bdr);align-items:center;justify-content:center;gap:10px;z-index:90;transition:top .15s}
.mtop img{height:28px;border-radius:4px}
.sb-nav{padding:12px 0;flex:1}
.ni{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;color:var(--muted);font-size:.95rem;transition:all .15s;user-select:none}
.ni:hover{color:var(--txt);background:rgba(255,255,255,.05)}
.ni.on{background:var(--gold);color:#fff;font-weight:700;margin:2px 12px;border-radius:8px}
.main{margin-left:var(--sw);flex:1;padding:32px;padding-bottom:80px;min-height:100vh}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-top:24px}
.sc{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:20px}
.sl{color:var(--muted);font-size:.82rem;display:flex;align-items:center;justify-content:space-between}
.sv{font-size:1.9rem;font-weight:800;margin-top:8px}
.ss{color:var(--muted);font-size:.78rem;margin-top:4px}
.ss.g{color:var(--gold)}
.pb{height:4px;background:var(--bdr);border-radius:2px;margin-top:8px}
.pf{height:100%;background:var(--gold);border-radius:2px}
.pt{font-size:2.5rem;font-weight:900;text-transform:uppercase;letter-spacing:-.5px}
.psub{color:var(--muted);margin-top:6px;font-size:.88rem}
.htag{color:var(--gold);font-size:.83rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.htitle{font-size:2.8rem;font-weight:900;line-height:1.05}
.hsub{color:var(--muted);margin-top:10px;max-width:520px;line-height:1.6}
.sec-title{font-size:.85rem;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;margin-top:28px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:20px}
.tb{padding:8px 14px;border-radius:6px;border:1px solid var(--bdr);background:var(--card);color:var(--muted);cursor:pointer;font-size:.78rem;font-weight:600}
.tb.on{background:var(--gold);color:#fff;border-color:var(--gold)}
.gf{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.gb{min-width:36px;height:36px;padding:0 10px;border-radius:6px;border:1px solid var(--bdr);background:var(--card);color:var(--muted);cursor:pointer;font-size:.8rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
.gb.on{background:var(--gold);color:#fff;border-color:var(--gold)}
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px;margin-top:16px}
.mc{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;transition:border-color .2s}
.mc.hp{border-left:3px solid var(--gold)}
.mc.fin{border-left:3px solid var(--grn)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.73rem;color:var(--muted)}
.mtag{font-weight:700;text-transform:uppercase}
.ms{padding:3px 8px;border-radius:4px;font-size:.68rem;font-weight:700;border:1px solid var(--bdr)}
.ms.fin{background:#333;color:#aaa}
.mteams{display:flex;align-items:center;justify-content:space-between;gap:8px}
.team{flex:1;min-width:0;overflow:hidden}
.tn{font-weight:700;font-size:.9rem}
.tf{display:block;margin-bottom:6px;height:20px}
.team-card-inp{width:100% !important;padding:4px 6px !important;font-size:.78rem !important;box-sizing:border-box;text-align:left !important}
.tf img{height:18px;border-radius:2px;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.sd{display:flex;align-items:center;gap:4px}
.sb2{background:var(--bg);border:1px solid var(--bdr);border-radius:6px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800}
.pr{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.pi{width:44px;height:44px;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:1.1rem;font-weight:700;text-align:center;outline:none;-moz-appearance:textfield}
.pi::-webkit-outer-spin-button,.pi::-webkit-inner-spin-button{-webkit-appearance:none}
.pi:focus{border-color:var(--gold)}
.pi:disabled{opacity:.45}
.pi-stepper{display:inline-flex;align-items:center;gap:5px;vertical-align:middle}
.pi-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--bdr);background:var(--bg);color:var(--txt);font-size:1rem;font-weight:700;line-height:1;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0;transition:all .12s;flex-shrink:0}
.pi-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.pi-btn:active:not(:disabled){transform:scale(.88)}
.pi-btn:disabled{opacity:.35;cursor:default}
.pi-val{min-width:22px;text-align:center;font-size:1.1rem;font-weight:700;color:var(--txt)}
.psb{padding:8px 14px;background:var(--gold);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.83rem}
.mf2{margin-top:8px;font-size:.72rem;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px}
.tv-tag{font-size:.68rem;padding:2px 6px;border-radius:4px;font-weight:700;display:inline-flex;align-items:center;gap:3px}
.tv-cplus{background:rgba(0,100,255,.15);color:#6af;border:1px solid rgba(0,100,255,.2)}
.tv-bein{background:rgba(255,80,0,.15);color:#fa8;border:1px solid rgba(255,80,0,.2)}
.ri{width:38px;height:32px;background:#0d1b3a;border:1px solid #1e3a6e;border-radius:6px;color:var(--gold);font-size:.9rem;font-weight:700;text-align:center;outline:none;-moz-appearance:textfield}
.ri::-webkit-outer-spin-button,.ri::-webkit-inner-spin-button{-webkit-appearance:none}
.rsb{padding:5px 10px;background:#1e2a4a;color:#aaa;border:none;border-radius:6px;font-size:.7rem;cursor:pointer}
.rsb:hover{background:#2a3a6e;color:#fff}
.rrow{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr);flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:.7rem;font-weight:700}
.badge.ex{background:rgba(26,86,219,.25);color:#60a5fa}
.badge.ok{background:rgba(34,197,94,.2);color:var(--grn)}
.badge.okd{background:rgba(34,197,94,.15);color:#86efac}
.badge.no{background:rgba(239,68,68,.1);color:#888}
.lb2{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px 20px;margin-bottom:20px}
.lf{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.fi{padding:10px 14px;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:.9rem;outline:none;flex:1;min-width:140px}
.fi:focus{border-color:var(--gold)}
::placeholder{color:var(--muted)}
.btn-g{padding:10px 20px;background:var(--gold);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-g:hover{background:var(--gold2)}
.btn-o{padding:8px 14px;background:transparent;color:var(--muted);border:1px solid var(--bdr);border-radius:8px;font-size:.83rem;cursor:pointer}
.btn-o:hover{color:var(--txt);border-color:#555}
.btn-r{padding:8px 14px;background:#c0392b;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.83rem}
.rt{width:100%;border-collapse:collapse}
.rt th{padding:10px 14px;text-align:left;font-size:.78rem;color:var(--muted);border-bottom:1px solid var(--bdr);font-weight:600}
.rt th.r{text-align:right}
.rt th.gd{color:var(--gold)}
.rt td{padding:12px 14px;border-bottom:1px solid var(--bdr);font-size:.88rem}
.rt tr:last-child td{border-bottom:none}
.rn{font-weight:700;color:var(--muted)}
.rn.t{color:var(--gold)}
.rpts{font-weight:800;color:var(--gold);text-align:right}
.rnc{text-align:right;color:var(--muted)}
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px;margin-top:24px}
.gc{background:var(--card);border:1px solid var(--bdr);border-radius:12px;overflow:hidden}
.ghd{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--bdr)}
.gbadge{background:var(--gold);color:#fff;font-weight:900;font-size:.72rem;padding:3px 8px;border-radius:4px}
.gt{width:100%;border-collapse:collapse}
.gt th{padding:6px 10px;text-align:center;font-size:.68rem;color:var(--muted);border-bottom:1px solid var(--bdr);font-weight:600}
.gt th:first-child{text-align:left;padding-left:16px}
.gt td{padding:8px 10px;text-align:center;font-size:.78rem;border-bottom:1px solid rgba(30,42,58,.5)}
.gt td:first-child{text-align:left;padding-left:16px}
.gt tr:last-child td{border-bottom:none}
.gt .tc{font-weight:700}
.gt .pc{color:var(--gold);font-weight:800}
.qual8{background:rgba(34,197,94,.04)}
.qualbar{background:rgba(26,86,219,.05)}
.phd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.pi2{display:flex;align-items:center;gap:16px}
.psg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.psc{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;text-align:center}
.psv{font-size:1.7rem;font-weight:900}
.psl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.pli{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bdr);font-size:.83rem;gap:8px;flex-wrap:wrap}
.pli:last-child{border-bottom:none}
.pmn{font-weight:600;flex:1}
.psc2{font-weight:800;color:var(--gold);white-space:nowrap}
.adm-tog{display:flex;align-items:center;gap:8px;color:var(--muted);cursor:pointer;font-size:.83rem;user-select:none;padding:8px 0}
.adm-pan{background:rgba(26,86,219,.08);border:1px solid #1e3a6e;border-radius:10px;padding:16px;margin-top:8px}
.hr2{border:none;border-top:1px solid #1e3a6e;margin:12px 0}
.empty{text-align:center;padding:40px;color:var(--muted)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--gold);color:var(--gold);padding:11px 18px;border-radius:8px;font-weight:600;z-index:9999;animation:tIn .3s ease;max-width:300px}
.toast.err{border-color:var(--red);color:var(--red)}
.toast.info{border-color:#1e3a6e;color:var(--muted)}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--bdr);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap{display:flex;justify-content:center;align-items:center;height:200px}
.setup-box{background:var(--card);border:2px dashed var(--gold);border-radius:16px;padding:32px;max-width:600px;margin:40px auto;text-align:center}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:28px;width:90%;max-width:440px}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.sync-dot.ok{background:var(--grn)}
.sync-dot.wait{background:var(--gold)}
.sync-dot.none{background:var(--muted)}
.ham{display:none !important}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99}
.jour-badge{display:inline-block;font-size:.68rem;font-weight:700;color:var(--gold);background:rgba(26,86,219,.15);border:1px solid rgba(26,86,219,.3);padding:2px 8px;border-radius:4px;margin-bottom:10px}
.bnav{display:none;position:fixed;bottom:0;left:0;width:100vw;height:58px;background:var(--nav);border-top:1px solid var(--bdr);z-index:300;align-items:stretch;transform:translateZ(0);will-change:transform}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--muted);font-size:.58rem;font-weight:600;padding:6px 2px;transition:color .15s;position:relative;border:none;background:transparent;-webkit-tap-highlight-color:transparent}
.bnav-item .bni{font-size:1.25rem;line-height:1}
.bnav-item.on{color:var(--gold)}
.bnav-item.on::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--gold);border-radius:0 0 2px 2px}
.bnav-badge{position:absolute;top:5px;right:calc(50% - 16px);background:var(--red);color:#fff;font-size:.52rem;font-weight:800;min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px}
@media(max-width:768px){
  .sb{display:none}
  .bnav{display:flex}
  .mtop{display:flex}
  body{padding-top:calc(var(--ban) + 46px)}
  .main{margin-left:0;padding:16px;padding-bottom:140px;max-width:100vw}
  .toast{bottom:70px;right:50%;transform:translateX(50%)}
  .pt{font-size:1.8rem}
  .mg,.gg{grid-template-columns:1fr}
  .phd{flex-direction:column}
  .psg{grid-template-columns:repeat(2,1fr)}
  .sg{grid-template-columns:repeat(2,1fr)}
  .lf{flex-direction:column}
  .htitle{font-size:2rem}
  .pi{width:52px;height:52px;font-size:1.2rem}
  .pi-btn{width:32px;height:32px;font-size:1.15rem}
  .pi-val{min-width:26px;font-size:1.25rem}
  .bktbl-wrap{max-width:calc(100vw - 32px);overflow-x:auto;-webkit-overflow-scrolling:touch}
}
#save-bar-portal{position:fixed;bottom:24px;left:0;right:0;z-index:210;display:flex;justify-content:center;pointer-events:none}
#save-bar-portal.above-bnav{bottom:70px}
#save-bar-portal button{pointer-events:all;padding:9px 20px;background:var(--gold);color:#fff;border:none;border-radius:20px;font-weight:700;font-size:.85rem;cursor:pointer;box-shadow:0 2px 12px rgba(26,86,219,.4);transition:transform .1s,box-shadow .1s;display:flex;align-items:center;gap:6px}
#save-bar-portal button:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(26,86,219,.5)}
#save-bar-portal button:active{transform:translateY(0)}
#save-bar-portal .count{background:rgba(0,0,0,.25);border-radius:6px;padding:2px 8px;font-size:.82rem}
.save-bar{display:none !important}
.cd{font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:4px;display:inline-flex;align-items:center;gap:3px}
.cd.hot{background:rgba(239,68,68,.15);color:#f87171}
.cd.warm{background:rgba(26,86,219,.15);color:#60a5fa}
.cd.ok{background:rgba(34,197,94,.12);color:#4ade80}
.nav-badge{background:var(--red);color:#fff;font-size:.62rem;font-weight:800;padding:1px 5px;border-radius:8px;margin-left:4px;vertical-align:middle}
.qf{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.qfb{padding:6px 12px;border-radius:6px;border:1px solid var(--bdr);background:var(--card);color:var(--muted);cursor:pointer;font-size:.75rem;font-weight:600}
.qfb.on{background:rgba(26,86,219,.15);color:var(--gold);border-color:var(--gold)}
.ldc-legend{display:flex;gap:12px;flex-wrap:wrap;margin:10px 0;font-size:.75rem}
.ldc-legend-item{display:flex;align-items:center;gap:6px}
.ldc-dot{width:10px;height:10px;border-radius:50%}
.ldc-dot.d8{background:var(--grn)}
.ldc-dot.bar{background:var(--gold)}
/* Bloc filtres sticky — desktop uniquement */
.matchs-sticky{
  position:sticky;
  top:var(--ban);
  z-index:50;
  background:var(--bg);
  padding:8px 0 10px;
  margin-bottom:4px;
  border-bottom:1px solid var(--bdr);
}
@media(max-width:768px){
  .matchs-sticky{
    position:static;
    border-bottom:none;
    padding:0;
  }
}
</style>
</head>
<body>
<div id="adm-ban" class="admin-banner">&#9889; MODE ADMIN ACTIF &mdash; Saisie des scores activée <span style="opacity:.6;font-size:.7rem;margin-left:8px">(visible uniquement pour toi)</span></div>
<nav class="bnav" id="bnav" aria-label="Navigation principale"></nav>
<div id="mtop" class="mtop"></div>
<div id="save-bar-portal"></div>
<div class="ov" id="ov"></div>
<nav class="sb" id="sb">
  <div class="sb-logo" onclick="logoClick()" title="Cliquer : retour à l'accueil" style="cursor:pointer"><span id="sb-logos" style="display:inline-flex;align-items:center;gap:6px;margin-right:6px"></span>&#9917; <span>PRONO LDC 26/27</span><span id="ver-badge" style="font-size:.6rem;opacity:.45;margin-left:6px;font-weight:400">v1.3.5</span></div>
  <div id="grp-chip" style="padding:4px 20px 8px;font-size:.72rem;color:var(--gold);opacity:.8"></div>
  <div class="sb-nav" id="snav"></div>
</nav>
<main class="main" id="main"></main>
<div id="tc"></div>

<div id="emergency-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:600;display:none;align-items:center;justify-content:center">
  <div style="background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:28px;width:90%;max-width:420px">
    <h3 style="color:var(--gold);margin-bottom:6px">&#128737; Accès d&apos;urgence</h3>
    <p style="font-size:.78rem;color:var(--muted);margin-bottom:16px">Réinitialise le compte admin et/ou le PIN.</p>
    <div style="display:flex;flex-direction:column;gap:10px">
      <input class="fi" id="em-secret" type="password" placeholder="Code secret">
      <input class="fi" id="em-np" type="password" placeholder="Nouveau mot de passe admin (vide = inchangé)">

      return{ok:false,msg:'Votre compte n\'est assigné à aucune équipe. Contactez l\'admin.'};

      if(k!==ADMIN&&r2.user.group_id){
        window.location.replace(window.location.pathname+'?g='+r2.user.group_id);
        return{ok:true};
      }
      if(k!==ADMIN&&!r2.user.group_id)
        return{ok:false,msg:'Votre compte n\'est assigné à aucune équipe. Contactez l\'admin.'};
      return{ok:true};
    }
    if(r2.msg==='Mot de passe incorrect.')return{ok:false,msg:r2.msg};
  }

  // Nouveau compte : nécessite un groupe
  if(!gid&&k!==ADMIN)return{ok:false,msg:'Choisissez une équipe pour vous inscrire.'};

    body:JSON.stringify(ins)
  }).then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d};});});
  if(!insertRes.ok)
    return{ok:false,msg:'Pseudo déjà pris dans cette équipe. Choisissez-en un autre.'};

// Format harmonisé pour tout affichage de points/moyennes : entier sans
// décimale, sinon 2 décimales max (arrondi). Utilisé partout (classement
// général, confrontations équipes/individuel, stats admin) pour éviter les
// incohérences (ex: 1 décimale ici, 2 ailleurs, toujours 2 même si rond...).
// Calcule le timestamp du coup d'envoi d'un match en heure de Paris, en
// tenant compte automatiquement du changement heure d'été (CEST +02:00)
// / heure d'hiver (CET +01:00) — indépendamment du fuseau horaire du
// navigateur qui consulte le site. Remplace tous les anciens `new
// Date(dt+'T'+ti+':00+01:00')` qui étaient faux une bonne partie de
// l'année (été = +02:00), et les `new Date(dt+'T'+ti)` qui dépendaient
// du fuseau local du visiteur.
function matchKickoff(dt,ti){
  if(!dt||!ti)return NaN;
  var probe=new Date(dt+'T12:00:00Z'); // midi UTC ce jour-là, sans ambiguïté DST
  var parisHour=+probe.toLocaleString('en-US',{timeZone:'Europe/Paris',hour12:false,hour:'2-digit'});
  var offsetH=parisHour-12; // 2 = CEST, 1 = CET
  var offsetStr=(offsetH>=0?'+':'-')+String(Math.abs(offsetH)).padStart(2,'0')+':00';
  return new Date(dt+'T'+ti+':00'+offsetStr).getTime();
}

function calcPts(pn,r,odds){

  if(odds&&odds.win&&r.h===r.a){

    var exactNul=(pn.h===r.h&&pn.a===r.a);
    var bonWinner=(pn.wp===odds.win);
    var ref=odds.od; // côte du nul = référence pour les TAB
    var refWin=odds.win==='h'?odds.oh:odds.oa; // côte du vainqueur TAB
    if(!ref)ref=refWin; // fallback si pas de côte nul
    if(!ref)return 0;
    // Bonus = côte du vainqueur TAB, ajoutée à la côte nul (uniquement si
    // le vainqueur est aussi correctement deviné) — récompense la difficulté
    // de deviner QUI gagne aux tirs au but, pas seulement le score nul.
    var winBonus=(odds.od&&refWin)?refWin:0;
    if(exactNul&&bonWinner)return Math.round((ref+winBonus)*10*100)/100; // (côte nul + côte vainqueur) × 10
    if(pronoNul&&bonWinner)return Math.round((ref+winBonus)*5*100)/100;  // (côte nul + côte vainqueur) × 5
    if(pronoNul)return Math.round(ref*2*100)/100;                        // prono nul seul (sans TAB correct)
    return 0;
  }
  // Cas normal (victoire nette)
  var exact=(pn.h===r.h&&pn.a===r.a);
  var isNul=(r.h===r.a);
  var goodWinner=Math.sign(pn.h-pn.a)===Math.sign(r.h-r.a);
  var goodDiff=goodWinner&&Math.abs(pn.h-pn.a)===Math.abs(r.h-r.a)&&!exact;
  var ref=null;
  if(odds){
    if(isNul&&odds.od) ref=odds.od;
    else if(!isNul&&r.h>r.a&&odds.oh) ref=odds.oh;
    else if(!isNul&&r.a>r.h&&odds.oa) ref=odds.oa;
  }
  if(!ref){
    if(exact)return 3;
    if(goodDiff)return 2;
    if(goodWinner)return 1;
    return 0;
  }
  if(exact)return Math.round(ref*10*100)/100;
  if(goodDiff)return Math.round(ref*5*100)/100;
  if(goodWinner)return Math.round(ref*2*100)/100;
  return 0;
}

function resolveUid(u){if(typeof u==='number')return u;var uu=DB.userMap[u];if(uu)return uu.id;var n=+u;return isNaN(n)?null:n;}
function pts(user){
  var pr=uPronos(user),res=DB.results,p=0,ex=0,ok=0,okd=0,pl=0,ids=Object.keys(pr);
  for(var i=0;i<ids.length;i++){
    var pn=pr[ids[i]],r=res[ids[i]];if(!r)continue;pl++;
    var odds=getMatchOdds(+ids[i]);
    var exact=(pn.h===r.h&&pn.a===r.a);
    var goodWinner=Math.sign(pn.h-pn.a)===Math.sign(r.h-r.a);
    var goodDiff=goodWinner&&Math.abs(pn.h-pn.a)===Math.abs(r.h-r.a)&&!exact;
    var earned=calcPts(pn,r,odds);
    p+=earned;
    if(exact)ex++;else if(goodDiff)okd++;else if(goodWinner)ok++;
  }
  // Bonus jokers résolus (activés + match joué) — voir DB_JOKERS_RESOLVED
  var uidNum=resolveUid(user);
  if(uidNum&&DB_JOKERS_RESOLVED[uidNum]){
    var mb=DB_JOKERS_RESOLVED[uidNum];
    Object.keys(mb).forEach(function(mid){p+=mb[mid];});
  }
  return{p:Math.round(p*100)/100,ex:ex,ok:ok,okd:okd,pl:pl};
}
function ptBadge(id,user){
  var pn=uPronos(user)[id],r=getRes(id);if(!pn||!r)return null;
  var odds=getMatchOdds(+id);
  var earned=calcPts(pn,r,odds);
  var uidNum=resolveUid(user),jokBonus=0;
  if(uidNum&&DB_JOKERS_RESOLVED[uidNum]&&DB_JOKERS_RESOLVED[uidNum][id])jokBonus=DB_JOKERS_RESOLVED[uidNum][id];
  earned=Math.round((earned+jokBonus)*100)/100;
  var jok=jokBonus!==0;
  // Cas TAB (uniquement si le résultat réel est vraiment un nul)
  if(odds&&odds.win&&r.h===r.a){
    var pronoNul=(pn.h===pn.a);
    var exactNul=(pn.h===r.h&&pn.a===r.a);
    var bonWinner=(pn.wp===odds.win);
    if(exactNul&&bonWinner)return{type:'ex',pts:earned,jok:jok};
    if(pronoNul&&bonWinner)return{type:'okd',pts:earned,jok:jok};
    if(pronoNul)return{type:'ok',pts:earned,jok:jok};
    return{type:jok?'ok':'no',pts:earned,jok:jok};
  }
  // Cas normal
  var exact=(pn.h===r.h&&pn.a===r.a);
  var goodWinner=Math.sign(pn.h-pn.a)===Math.sign(r.h-r.a);
  var goodDiff=goodWinner&&Math.abs(pn.h-pn.a)===Math.abs(r.h-r.a)&&!exact;
  if(exact)return{type:'ex',pts:earned,jok:jok};
  if(goodDiff)return{type:'okd',pts:earned,jok:jok};
  if(goodWinner)return{type:'ok',pts:earned,jok:jok};
  return{type:jok?'ok':'no',pts:earned,jok:jok};
}

}

function ldcLigueStandings(){
  var teams={},res=DB.results;
  for(var mi=0;mi<M.length;mi++){
    var m=M[mi];if(m.ph!=='LIGUE')continue;
    if(m.h&&m.h!=='TBD'&&!teams[m.h])teams[m.h]={j:0,g:0,n:0,p:0,bp:0,bc:0,d:0,pts:0};
    if(m.a&&m.a!=='TBD'&&!teams[m.a])teams[m.a]={j:0,g:0,n:0,p:0,bp:0,bc:0,d:0,pts:0};
  }
  for(var mi=0;mi<M.length;mi++){
    var m=M[mi];if(m.ph!=='LIGUE')continue;
    var r=res[m.id];if(!r)continue;
    if(!teams[m.h]||!teams[m.a])continue;
    var h=r.h,a=r.a;
    teams[m.h].j++;teams[m.a].j++;
    teams[m.h].bp+=h;teams[m.h].bc+=a;
    teams[m.a].bp+=a;teams[m.a].bc+=h;
    if(h>a){teams[m.h].g++;teams[m.h].pts+=3;teams[m.a].p++;}
    else if(h<a){teams[m.a].g++;teams[m.a].pts+=3;teams[m.h].p++;}
    else{teams[m.h].n++;teams[m.h].pts++;teams[m.a].n++;teams[m.a].pts++;}
    teams[m.h].d=teams[m.h].bp-teams[m.h].bc;
    teams[m.a].d=teams[m.a].bp-teams[m.a].bc;
  }
  var arr=[];
  for(var t in teams)arr.push(Object.assign({name:t},teams[t]));
  arr.sort(function(a,b){return b.pts-a.pts||b.d-a.d||b.bp-a.bp||a.name.localeCompare(b.name);});
  return arr;
}

  var order=['LIGUE','BARRAGES','HUITIÈMES','QUARTS','DEMIS','FINALE'];
  var bestPhase=null;
  for(var oi=order.length-1;oi>=0;oi--){
    var ph=order[oi],hasUnscored=false;
    for(var mi=0;mi<M.length;mi++){if(M[mi].ph===ph&&!DB.results[M[mi].id]){hasUnscored=true;break;}}
    if(hasUnscored)bestPhase=ph;
    else if(bestPhase)break;
  }
  return bestPhase||order[order.length-1];
}

    var now2=new Date();var todayStr=now2.getFullYear()+'-'+String(now2.getMonth()+1).padStart(2,'0')+'-'+String(now2.getDate()).padStart(2,'0');
    var pc=0,todayCount=0;
    for(var fi=0;fi<filtered.length;fi++){var fm=filtered[fi];var fOpen=new Date().getTime()<matchKickoff(fm.dt,fm.ti);if(fOpen&&!pr2[fm.id])pc++;if(fm.dt===todayStr)todayCount++;}
    if(S.qf!=='all'){
      filtered=filtered.filter(function(m){var hasPr=!!pr2[m.id];var isOpen=new Date().getTime()<matchKickoff(m.dt,m.ti);if(S.qf==='today')return m.dt===todayStr;if(S.qf==='pending')return !DB.results[m.id];if(S.qf==='open')return isOpen&&!hasPr;if(S.qf==='done')return hasPr;return true;});
    }
    var finishedCount=filtered.filter(function(m){return !!DB.results[m.id];}).length;
    var pendingCount2=filtered.length-finishedCount;
    qfH='<div class="qf">'
      +'<button class="qfb'+(S.qf==='all'?' on':'')+'" onclick="setQF(\'all\')">Tous ('+filtered.length+')</button>'
      +(todayCount>0?'<button class="qfb'+(S.qf==='today'?' on':'')+'" onclick="setQF(\'today\')">&#128197; Du jour ('+todayCount+')</button>':'')
      +'<button class="qfb'+(S.qf==='pending'?' on':'')+'" onclick="setQF(\'pending\')">&#9201; À venir ('+pendingCount2+')</button>'
      +'<button class="qfb'+(S.qf==='open'?' on':'')+'" onclick="setQF(\'open\')">&#128274; Sans prono ('+pc+')</button>'
      +'<button class="qfb'+(S.qf==='done'?' on':'')+'" onclick="setQF(\'done\')">&#10003; Déjà saisis</button>'
      +'</div>';

  // Filtres équipe et date (appliqués après qf pour que les selects reflètent les résultats qf)
  if(S.search){
    var sq=S.search.toLowerCase();

  }
  if(S.searchDate){
    filtered=filtered.filter(function(m){return m.dt===S.searchDate;});
  }

  // Construction des selects dynamiques à partir des matchs filtrés (avant search/date)
  var allFiltered=[];
  for(var mi2=0;mi2<M.length;mi2++){var m2=M[mi2];if(m2.ph!==S.tab)continue;allFiltered.push(m2);}
  if(S.tab==='LIGUE'&&S.jour!=='ALL') allFiltered=allFiltered.filter(function(m){return getJournee(m.id)===S.jour;});

  var teams={};
  for(var ti2=0;ti2<allFiltered.length;ti2++){if(allFiltered[ti2].h!=='TBD')teams[allFiltered[ti2].h]=1;if(allFiltered[ti2].a!=='TBD')teams[allFiltered[ti2].a]=1;}
  var teamOpts='<option value="">Toutes les équipes</option>';
  Object.keys(teams).sort().forEach(function(t){teamOpts+='<option value="'+t+'"'+(S.search===t?' selected':'')+'>'+t+'</option>';});

  var datesMap={};
  for(var di=0;di<allFiltered.length;di++) datesMap[allFiltered[di].dt]=1;
  var dateOpts='<option value="">Toutes les dates</option>';
  Object.keys(datesMap).sort().forEach(function(d){
    var dl=new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
    dateOpts+='<option value="'+d+'"'+(S.searchDate===d?' selected':'')+'>'+dl+'</option>';
  });

  var hasTeams=Object.keys(teams).length>0;
  var searchH=hasTeams?'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">'
    +'<select class="fi" id="sel-team" onchange="setSearchTeam(this.value)" oninput="setSearchTeam(this.value)" style="flex:1;min-width:160px;padding:7px 12px;font-size:.82rem">'+teamOpts+'</select>'
    +'<select class="fi" id="sel-date" onchange="setSearchDate(this.value)" oninput="setSearchDate(this.value)" style="flex:1;min-width:160px;padding:7px 12px;font-size:.82rem">'+dateOpts+'</select>'
    +(S.search||S.searchDate?'<button class="rsb" onclick="S.search=\'\';S.searchDate=\'\';render()" style="white-space:nowrap">✕ Effacer</button>':'')
    +'</div>':'';

  var cards='';
  for(var ci=0;ci<filtered.length;ci++)cards+=cardMatch(filtered[ci]);

  var portal=document.getElementById('save-bar-portal');
  if(portal){
    if(S.user&&S.user!==ADMIN){
      var isMobile=window.innerWidth<=768;
      portal.className=isMobile?'above-bnav':'';
      portal.innerHTML='<button onclick="hSaveAll()">&#128190; Sauvegarder <span class="count" id="prono-count">0</span></button>';
    }else portal.innerHTML='';
  }

  var totalM2=M.filter(function(m){return m.ph===S.tab;}).length;
  return '<div class="pt">LES MATCHS</div><p class="psub">'+totalM2+' matchs en '+labels[S.tab]+' &middot; Saisissez votre pronostic sur chaque carte.</p>'
    +banner
    +'<div class="matchs-sticky">'+tabsH+jourH+searchH+qfH+'</div>'
    +(filtered.length===0?'<div class="empty" style="margin-top:20px">Aucun match pour ce filtre.</div>':'<div class="mg">'+cards+'</div>');
}

// Génère un stepper +/- pour la saisie de score pronostic (0, 1, 2...
// sans plafond). La valeur réelle est gardée dans un <input type=hidden>,
// l'affichage montre "?" tant qu'aucune valeur n'a été choisie.
function pronoStepperHTML(id,val,locked){
  var display=(val===''||val===null||val===undefined)?'?':val;
  var disAttr=locked?' disabled':'';
  return '<span class="pi-stepper">'
    +'<button type="button" class="pi-btn pi-minus"'+disAttr+' onclick="hPronoStep(\''+id+'\',-1)">−</button>'
    +'<span class="pi-val" id="'+id+'-disp">'+display+'</span>'
    +'<input type="hidden" id="'+id+'" value="'+val+'"'+disAttr+'>'
    +'<button type="button" class="pi-btn pi-plus"'+disAttr+' onclick="hPronoStep(\''+id+'\',1)">+</button>'
    +'</span>';
}
function hPronoStep(id,delta){
  var hidden=document.getElementById(id);
  if(!hidden||hidden.disabled)return;
  var cur=hidden.value;
  var n=(cur==='')?-1:+cur; // "?" + un "+" doit amener à 0
  n+=delta;
  if(n<0)hidden.value='';
  else{if(n>20)n=20;hidden.value=String(n);}
  var disp=document.getElementById(id+'-disp');
  if(disp)disp.textContent=(hidden.value==='')?'?':hidden.value;
  updatePronoCount();
  var mid=id.replace(/^p[ha]/,'');
  hPronoChange(+mid);
}

    // Menu TAB joueur : KO uniquement (barrages, 8es, quarts, demis, finale)

function renderMyJokers(){
  var pending=DB_JOKERS.filter(function(j){return!j.joker_type;});

  var resolved=DB_JOKERS.filter(function(j){return j.resolved;});

    h+='<h4 style="margin-bottom:8px">🎁 Choix libre à faire ('+pending.length+')</h4>';
    pending.forEach(function(j){
      h+='<div class="card" style="margin-bottom:10px"><div style="font-size:.8rem;color:var(--muted);margin-bottom:8px">Obtenu via '+(j.obtained_via==='exact'?'un score exact':'un palier')+' — choisis ton joker :</div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:6px">'
        +JOKER_ORDER.map(function(jt){var m=JOKER_META[jt];return '<button class="rsb" onclick="hChooseJoker('+j.id+',\''+jt+'\')" title="'+m.desc.replace(/"/g,'&quot;')+'">'+m.ic+' '+m.name+'</button>';}).join('')
        +'</div></div>';
    });
  }

  h+='<h4 style="margin:16px 0 8px">🎒 En stock ('+available.length+')</h4>';
  if(!available.length)h+='<div class="empty" style="margin-bottom:16px">Aucun joker prêt à l\'emploi pour l\'instant.</div>';
  else available.forEach(function(j){
    var m=JOKER_META[j.joker_type];
    h+='<div class="card" style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">'
      +'<div><div style="font-weight:700">'+m.ic+' '+m.name+'</div><div style="font-size:.76rem;color:var(--muted);max-width:420px">'+m.desc+'</div></div>'
      +'<button class="btn-g" onclick="tActivateJoker('+j.id+')">Activer</button>'
      +'</div>';

  if(activated.length){
    h+='<h4 style="margin:16px 0 8px">⏳ Activés, en attente du résultat ('+activated.length+')</h4>';
    activated.forEach(function(j){
      var m=JOKER_META[j.joker_type],mm=null;for(var i=0;i<M.length;i++)if(M[i].id===j.match_id){mm=M[i];break;}
      h+='<div class="card" style="margin-bottom:8px"><div style="font-weight:700">'+m.ic+' '+m.name+'</div>'+(mm?'<div style="font-size:.78rem;color:var(--muted)">'+mm.h+' vs '+mm.a+'</div>':'')+'</div>';
    });
  }

  if(resolved.length){
    h+='<h4 style="margin:16px 0 8px">✅ Utilisés ('+resolved.length+')</h4>';
    resolved.slice().reverse().forEach(function(j){
      var m=JOKER_META[j.joker_type]||{ic:'🎁',name:j.joker_type};
      var mm=null;for(var i=0;i<M.length;i++)if(M[i].id===j.match_id){mm=M[i];break;}
      var bp=j.bonus_points||0;
      h+='<div class="card" style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">'

        +'<span style="font-weight:800;color:'+(bp>0?'var(--grn)':'var(--muted)')+'">'+(bp>0?'+':'')+fmtPts(bp)+' pts</span>'
        +'</div>';
    });

function jokerActivationForm(j){
  var meta=JOKER_META[j.joker_type];
  var now=Date.now();
  var upcoming=M.filter(function(m){if(!m.dt||!m.ti)return false;var k=matchKickoff(m.dt,m.ti);return!isNaN(k)&&k>now;});
  var matchOpts=upcoming.map(function(m){return '<option value="'+m.id+'">'+m.h+' vs '+m.a+' — '+m.dt+' '+m.ti+'</option>';}).join('');
  var targetField='';

    var me=DB.userMap[S.user];

      +otherGroups.map(function(g){return '<option value="'+g.id+'">'+g.name+'</option>';}).join('')+'</select>';
  }
  return '<div class="card" style="margin-top:-4px;margin-bottom:10px;border-color:var(--gold)">'
    +'<div style="font-size:.8rem;color:var(--muted);margin-bottom:8px">Activer '+meta.ic+' '+meta.name+' sur quel match ?</div>'
    +'<select class="fi" id="jok-target-match">'+matchOpts+'</select>'

    +'<div style="margin-top:10px;display:flex;gap:8px"><button class="btn-g" onclick="hActivateJoker('+j.id+')">Confirmer</button><button class="btn-o" onclick="tActivateJoker('+j.id+')">Annuler</button></div>'
    +'<div id="jok-act-err" style="color:var(--red);font-size:.78rem;margin-top:6px"></div>'
    +'</div>';

async function hChooseJoker(inventoryId,jokerType){
  if(!SESSION_PW){toast('Reconnecte-toi pour confirmer ce choix.','err');return;}
  var r=await secureCall('chooseJoker',{pseudo:S.user,password:SESSION_PW,inventoryId:inventoryId,jokerType:jokerType});
  if(!r.ok){toast(r.msg||'Erreur','err');return;}
  var row=DB_JOKERS.find(function(j){return j.id===inventoryId;});
  if(row)row.joker_type=jokerType;
  toast(JOKER_META[jokerType].ic+' '+JOKER_META[jokerType].name+' ajouté à ton stock ✓');
  render();
}

async function hActivateJoker(inventoryId){
  var matchSel=document.getElementById('jok-target-match');
  var matchId=matchSel?+matchSel.value:null;
  var e=document.getElementById('jok-act-err');
  if(!matchId){if(e)e.textContent='Choisis un match.';return;}
  if(!SESSION_PW){toast('Reconnecte-toi pour activer ce joker.','err');return;}
  var payload={pseudo:S.user,password:SESSION_PW,inventoryId:inventoryId,matchId:matchId};
  var tu=document.getElementById('jok-target-user');if(tu&&tu.value)payload.targetUserId=tu.value;
  var tg=document.getElementById('jok-target-group');if(tg&&tg.value)payload.targetGroupId=tg.value;
  var r=await secureCall('activateJoker',payload);
  if(!r.ok){if(e)e.textContent=r.msg||'Erreur';return;}
  var row=DB_JOKERS.find(function(j){return j.id===inventoryId;});
  if(row){row.match_id=matchId;row.activated_at=new Date().toISOString();if(payload.targetUserId)row.target_user_id=payload.targetUserId;if(payload.targetGroupId)row.target_group_id=payload.targetGroupId;}
  S.activateJokerId=null;
  toast('Joker activé ✓');
  render();
}

function pgTableau(){
  function gm(id){for(var i=0;i<M.length;i++)if(M[i].id===id)return M[i];return null;}
  function fmt(dt){if(!dt)return '';return new Date(dt+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'});}
  function tn(n){if(!n||n==='TBD')return '<em style="color:var(--muted)">TBD</em>';return '<span>'+n+'</span>';}

  function card(id){
    var m=gm(id);if(!m)return '<div class="bkc"></div>';
    var r=DB.results[id];
    var isTab=r&&r.h===r.a&&m.win;
    var won=r?'style="border-color:'+(isTab?'var(--gold)':'var(--grn)')+'"':'';

    // Déterminer le vainqueur (score ou TAB)
    var hWins=r&&(r.h>r.a||(isTab&&m.win==='h'));
    var aWins=r&&(r.a>r.h||(isTab&&m.win==='a'));

    // Score home
    var s1=r?'<span class="bks '+(hWins?'bkw':'bkl')+'">'+r.h+'</span>':'';
    // Score away
    var s2=r?'<span class="bks '+(aWins?'bkw':'bkl')+'">'+r.a+'</span>':'';

    // Indicateur TAB avec nom du vainqueur
    var tabInd='';
    if(isTab){
      var tabWinner=m.win==='h'?m.h:m.a;
      tabInd='<div style="margin-top:4px;padding:2px 6px;background:rgba(26,86,219,.15);border-radius:4px;display:flex;align-items:center;gap:4px">'
        +'<span style="font-size:.65rem;color:var(--gold)">⚽ TAB →</span>'
        +'<span style="font-size:.65rem;font-weight:700;color:var(--gold)">'+tabWinner+'</span>'
        +'</div>';
    }

    return '<div class="bkc" '+won+' onclick="setTab(\''+m.ph+'\');go(\'matchs\')" title="Match #'+id+'">'
      +'<div class="bkn">#'+id+' · '+fmt(m.dt)+(m.ti?' · '+m.ti:'')+'</div>'

      +(m.v&&m.v!=='TBD'?'<div style="font-size:.6rem;color:var(--muted);margin-top:3px">📍 '+m.v+'</div>':'')
      +'</div>';

    return '<div class="bkpair">'
      +'<div class="bkslot '+(conn?'bkconn-top':'')+'">'+card(id1)+'</div>'

      +'</div>';

    +'.bktbl-wrap{max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}'

  function rpair(id1,id2){return '<div class="bkpair"><div class="bkslot bkconn-top-l">'+card(id1)+'</div><div class="bkslot bkconn-bot-l">'+card(id2)+'</div></div>';}

  var sD='<div class="bkcol"><div class="bkhead">Demis</div>'+rsingle(188)+'</div>';

    +'<div class="bktbl-wrap">'

    }
    if(!DB.groups.length)grpChecks='<p style="color:var(--muted);font-size:.8rem">Aucune équipe créée.</p>';
    var existList='';
    if(DB.confrontations.length){
      for(var ci=0;ci<DB.confrontations.length;ci++){
        var cf=DB.confrontations[ci];
        var cfGids=DB.confrontationGroups.filter(function(cg){return cg.confrontation_id===cf.id;}).map(function(cg){return cg.group_id;});
        var cfGNames=cfGids.map(function(gid){for(var j=0;j<DB.groups.length;j++)if(DB.groups[j].id===gid)return DB.groups[j].name;return gid;}).join(' · ');
        existList+='<div style="background:var(--bg);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">'
          +'<div><strong>'+cf.name+'</strong><div style="font-size:.75rem;color:var(--muted);margin-top:2px">'+cfGNames+'</div></div>'
          +'<button class="rsb" onclick="hDeleteConfrontation(\''+cf.id+'\')" style="color:var(--red)">🗑 Supprimer</button>'
          +'</div>';
      }
    }else{
      existList='<p style="color:var(--muted);font-size:.8rem;margin-bottom:8px">Aucune confrontation créée.</p>';
    }
    adminPanel='<div class="adm-pan" style="margin-bottom:24px">'
      +'<h4 style="margin-bottom:12px">⚔️ Gestion des confrontations</h4>'
      +existList
      +'<hr class="hr2">'
      +'<h4 style="margin-bottom:10px">+ Nouvelle confrontation</h4>'
      +'<div style="display:flex;flex-direction:column;gap:10px">'
      +'<input class="fi" id="cf-name" placeholder="Nom de la confrontation (ex: Amis vs Bureau)">'
      +'<div style="background:var(--bg);border:1px solid var(--bdr);border-radius:8px;padding:12px">'
      +'<div style="font-size:.78rem;color:var(--muted);margin-bottom:8px">Équipes participantes (min. 2) :</div>'
      +grpChecks+'</div>'
      +'<button class="btn-g" onclick="hCreateConfrontation()">Créer la confrontation</button>'
      +'</div></div>';
  }

  // ─── Onglets ────────────────────────────────────────────────
  var cfTabsH='<div class="tabs" style="margin-top:16px;margin-bottom:16px">'
    +'<button class="tb'+(S.cfTab==='equipes'?' on':'')+'" onclick="S.cfTab=\'equipes\';render()">⚔️ Équipes</button>'
    +'<button class="tb'+(S.cfTab==='individuel'?' on':'')+'" onclick="S.cfTab=\'individuel\';render()">🏆 Classement individuel</button>'
    +'</div>';

  // ─── Onglet ÉQUIPES — via RPC group_stats (aucun prono rapatrié) ──
  var cfBlocks='';
  if(S.cfTab==='equipes'){
    // Affichage d'un spinner puis chargement async des stats via RPC
    // On retourne d'abord le HTML avec un placeholder, puis on charge les données
    if(!S._cfStats){
      // Premier affichage : lancer le chargement async et afficher un spinner
      S._cfStats='loading';
      (async function(){
        var statsMap={};
        // Pour chaque groupe de chaque confrontation visible, appeler group_stats()
        var allGids2={};
        for(var cfi=0;cfi<visibleCFs.length;cfi++){
          var cfGids=DB.confrontationGroups.filter(function(cg){return cg.confrontation_id===visibleCFs[cfi].id;}).map(function(cg){return cg.group_id;});
          cfGids.forEach(function(gid){allGids2[gid]=1;});
        }
        var gidList=Object.keys(allGids2);
        for(var gi=0;gi<gidList.length;gi++){
          var gid=gidList[gi];
          try{
            var r=await fetch(SUPABASE_URL+'/rest/v1/rpc/group_stats',{
              method:'POST',
              headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},
              body:JSON.stringify({gid:gid})
            });
            var d=await r.json();
            if(d&&d.length>0){statsMap[gid]={pts:+d[0].total_pts||0,pronos:+d[0].total_pronos||0};}
            else if(d&&d.total_pts!==undefined){statsMap[gid]={pts:+d.total_pts||0,pronos:+d.total_pronos||0};}
            else statsMap[gid]={pts:0,pronos:0};
          }catch(e){statsMap[gid]={pts:0,pronos:0};}
        }
        // Aussi compter le nb de joueurs par groupe (depuis DB.users, toujours chargé pour son groupe)
        // Pour les groupes adverses, on demande juste le count via l'API
        var cntMap={};
        for(var gi2=0;gi2<gidList.length;gi2++){
          var gid2=gidList[gi2];
          var localCnt=DB.users.filter(function(u){return u.group_id===gid2&&u.pseudo_key!==ADMIN;}).length;
          if(localCnt>0){cntMap[gid2]=localCnt;}
          else{
            try{
              var rc=await fetch(SUPABASE_URL+'/rest/v1/users?group_id=eq.'+gid2+'&pseudo_key=neq.adminldc&select=id',{
                headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'count=exact','Range':'0-0'}
              });
              var ct=rc.headers.get('content-range');
              cntMap[gid2]=ct?parseInt(ct.split('/')[1])||0:0;
            }catch(e){cntMap[gid2]=0;}
          }
        }
        S._cfStats={statsMap:statsMap,cntMap:cntMap};
        render();
      })();
      cfBlocks='<div class="loading-wrap"><div class="spinner"></div></div>';
    } else if(S._cfStats==='loading'){
      cfBlocks='<div class="loading-wrap"><div class="spinner"></div></div>';
    } else {
      // Données disponibles : afficher les confrontations
      var statsMap=S._cfStats.statsMap;
      var cntMap=S._cfStats.cntMap;
      var myGid2=S.user&&!isAdmin()&&DB.userMap[S.user]?DB.userMap[S.user].group_id:null;
      var medals=['🥇','🥈','🥉'];
      for(var cfi=0;cfi<visibleCFs.length;cfi++){
        var cf=visibleCFs[cfi];
        var cfGids=DB.confrontationGroups.filter(function(cg){return cg.confrontation_id===cf.id;}).map(function(cg){return cg.group_id;});
        var cfGroups=[];
        for(var gi3=0;gi3<cfGids.length;gi3++){
          var gid3=cfGids[gi3];
          var gname='';for(var j=0;j<DB.groups.length;j++)if(DB.groups[j].id===gid3){gname=DB.groups[j].name;break;}
          var st=statsMap[gid3]||{pts:0,pronos:0};
          var ratio=st.pronos>0?Math.round(st.pts/st.pronos*100)/100:0;
          cfGroups.push({gid:gid3,name:gname,cnt:cntMap[gid3]||0,totalPts:Math.round(st.pts),totalPronos:st.pronos,ratio:ratio});
        }
        cfGroups.sort(function(a,b){return b.ratio-a.ratio||b.totalPts-a.totalPts;});
        var rows='';
        for(var ri=0;ri<cfGroups.length;ri++){
          var cg=cfGroups[ri];
          var isMe=(cg.gid===myGid2);
          var medal=ri<3?medals[ri]:(ri+1)+'.';
          var bg=isMe?'background:rgba(26,86,219,.08);border-color:var(--gold)':'';
          rows+='<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--bdr);border-radius:10px;margin-bottom:8px;'+bg+'">'
            +'<div style="font-size:1.4rem;min-width:32px;text-align:center">'+medal+'</div>'
            +'<div style="flex:1">'
            +'<div style="font-weight:700;font-size:.95rem">⚔️ '+cg.name+(isMe?' <span style="color:var(--gold);font-size:.72rem">(vous)</span>':'')+'</div>'
            +'<div style="font-size:.75rem;color:var(--muted);margin-top:2px">'+cg.cnt+' joueur(s) · '+cg.totalPronos+' pronos · '+cg.totalPts+' pts cumulés</div>'
            +'</div>'
            +'<div style="text-align:right">'
            +'<div style="font-size:1.5rem;font-weight:900;color:var(--gold)">'+cg.ratio.toFixed(2)+'</div>'
            +'<div style="font-size:.68rem;color:var(--muted)">pts / prono</div>'
            +'</div></div>';
        }
        cfBlocks+='<div style="background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:20px;margin-bottom:20px">'
          +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">'
          +'<span style="font-size:1.4rem">⚔️</span>'
          +'<div><div style="font-size:1.1rem;font-weight:800">'+cf.name+'</div>'
          +'<div style="font-size:.75rem;color:var(--muted)">'+cfGroups.length+' équipes en compétition</div></div></div>'
          +rows+'</div>';
      }
      if(!visibleCFs.length&&isAdmin())cfBlocks='<div class="empty">Aucune confrontation créée.</div>';
      // Bouton rafraîchir
      cfBlocks='<div style="text-align:right;margin-bottom:8px"><button class="rsb" onclick="S._cfStats=null;render()">↻ Rafraîchir</button></div>'+cfBlocks;
    }

  // ─── Onglet CLASSEMENT INDIVIDUEL — chargement à la demande ──
  }else{
    if(!S._cfBoard){
      S._cfBoard='loading';
      (async function(){
        // Trouver tous les groupes des confrontations visibles
        var allGids={};
        for(var cfi2=0;cfi2<visibleCFs.length;cfi2++){
          var cfGids2=DB.confrontationGroups.filter(function(cg){return cg.confrontation_id===visibleCFs[cfi2].id;}).map(function(cg){return cg.group_id;});
          cfGids2.forEach(function(gid){allGids[gid]=1;});
        }
        // Charger les users et pronos des groupes adverses (pas déjà dans DB.users)
        var knownGids={};
        DB.users.forEach(function(u){if(u.group_id)knownGids[u.group_id]=1;});
        var gidsToLoad=Object.keys(allGids).filter(function(gid){return !knownGids[gid];});
        var extraUsers=[];
        for(var gi=0;gi<gidsToLoad.length;gi++){
          var rU2=await sb.from('users').select(USERS_SAFE_COLS).eq('group_id',gidsToLoad[gi]);
          if(rU2.data)extraUsers=extraUsers.concat(rU2.data);
        }
        // Charger leurs pronos
        var extraIds=extraUsers.map(function(u){return u.id;});
        var extraPronos=[];
        if(extraIds.length){
          // Charger les pronos en batches de 50 ids (évite les URLs trop longues)
          for(var bi=0;bi<extraIds.length;bi+=50){
            var batch=extraIds.slice(bi,bi+50);
            var rPr=await fetch(SUPABASE_URL+'/rest/v1/pronos?user_id=in.('+batch.join(',')+')',{
              headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
            });
            var prData=await rPr.json();
            if(Array.isArray(prData))extraPronos=extraPronos.concat(prData);
          }
        }
        // Construire le classement
        var board2=[];
        // Joueurs déjà dans DB.users (propre groupe + admin)
        var allUsers=DB.users.concat(extraUsers);
        var allPronos=Object.assign({},DB.pronos);
        // Intégrer les pronos adverses dans un index temporaire
        var extraPrMap={};
        extraPronos.forEach(function(p){
          if(!extraPrMap[p.user_id])extraPrMap[p.user_id]={};
          extraPrMap[p.user_id][p.match_id]={h:p.home_score,a:p.away_score,wp:p.winner_prono||null};
        });
        for(var ui=0;ui<allUsers.length;ui++){
          var uu=allUsers[ui];
          if(uu.pseudo_key===ADMIN)continue;
          if(!allGids[uu.group_id])continue;
          var userPronos=DB.pronos[uu.id]||DB.pronos[uu.pseudo_key]||extraPrMap[uu.id]||{};
          // Calculer points manuellement pour les users adverses
          var totalPts=0,exacts=0,bons=0,played=0;
          var prIds=Object.keys(userPronos);
          for(var pi=0;pi<prIds.length;pi++){
            var pn=userPronos[prIds[pi]];
            var r=DB.results[prIds[pi]];
            if(!r)continue;
            played++;
            var odds=getMatchOdds(+prIds[pi]);
            var earned=calcPts(pn,r,odds);
            totalPts+=earned;
            var exact=(pn.h===r.h&&pn.a===r.a);
            var goodW=Math.sign(pn.h-pn.a)===Math.sign(r.h-r.a);
            if(exact)exacts++;else if(goodW)bons++;
          }
          var gname='';for(var j=0;j<DB.groups.length;j++)if(DB.groups[j].id===uu.group_id){gname=DB.groups[j].name;break;}
          board2.push({k:uu.pseudo_key,id:uu.id,gid:uu.group_id,gname:gname,ps:uu.pseudo_display,np:prIds.length,p:Math.round(totalPts*100)/100,ex:exacts,ok:bons,pl:played});
        }
        board2.sort(function(a,b){return b.p-a.p||b.ex-a.ex||b.ok-a.ok;});
        S._cfBoard=board2;
        render();
      })();
      cfBlocks='<div class="loading-wrap"><div class="spinner"></div></div>';
    } else if(S._cfBoard==='loading'){
      cfBlocks='<div class="loading-wrap"><div class="spinner"></div></div>';
    } else {
      var board2=S._cfBoard;
      var myGid3=S.user&&!isAdmin()&&DB.userMap[S.user]?DB.userMap[S.user].group_id:null;
      var rows2='';
      for(var bi2=0;bi2<board2.length;bi2++){
        var u2=board2[bi2];
        var medal2=bi2===0?'🥇':bi2===1?'🥈':bi2===2?'🥉':(bi2+1);
        var you2=u2.k===S.user?' <span style="color:var(--gold);font-size:.73rem">◀</span>':'';
        rows2+='<tr'+(u2.k===S.user?' style="background:rgba(26,86,219,.05)"':'')+'>'
          +'<td class="rn'+(bi2<3?' t':'')+'">'+medal2+'</td>'
          +'<td>'+u2.ps+you2+'</td>'
          +'<td style="color:var(--gold);font-size:.75rem">'+u2.gname+'</td>'
          +'<td class="rnc">'+u2.ex+'</td>'
          +'<td class="rnc">'+u2.np+'</td>'
          +'<td class="rpts">'+fmtPts(u2.p)+'</td>'
          +'</tr>';
      }
      if(!rows2){
        cfBlocks='<div class="empty">Aucun joueur dans ces confrontations.</div>';
      }else{
        cfBlocks='<div style="text-align:right;margin-bottom:8px"><button class="rsb" onclick="S._cfBoard=null;render()">↻ Rafraîchir</button></div>'
          +'<div class="card" style="padding:0;overflow-x:auto"><table class="rt">'
          +'<thead><tr><th>#</th><th>Joueur</th><th>Équipe</th><th class="r">🎯 Exacts</th><th class="r">Pronos</th><th class="r gd">Points</th></tr></thead>'
          +'<tbody>'+rows2+'</tbody></table></div>';
      }
    }
  }

  return '<div class="pt">⚔️ ÉQUIPES</div>'
    +'<p class="psub">Confrontations inter-équipes &middot; ratio points&nbsp;/&nbsp;pronos joués</p>'
    +adminPanel+cfTabsH
    +'<div>'+cfBlocks+'</div>';
}

    });

      gBoard.sort(function(a,b){return b.p-a.p||b.ex-a.ex||b.ok-a.ok;});

      if(gRows)content2+='<div style="margin-top:20px"><div class="card" style="padding:0"><table class="rt"><thead><tr><th>#</th><th>Joueur</th><th class="r">Pronos</th><th class="r">Exacts</th><th class="r">Résultats</th><th class="r gd">Points</th></tr></thead><tbody>'+gRows+'</tbody></table></div></div>';

  return '<div class="pt">&#128202; STATISTIQUES</div><p class="psub">Vue globale &mdash; visible uniquement par l\'admin</p>'+tabsH+content2;

function hPronoChange(id){
  var m=null;for(var i=0;i<M.length;i++)if(M[i].id===+id){m=M[i];break;}
  if(!m||m.ph==='LIGUE')return; // pas de TAB en phase de ligue
  var hv=document.getElementById('ph'+id)?document.getElementById('ph'+id).value:'';
  var av=document.getElementById('pa'+id)?document.getElementById('pa'+id).value:'';
  var existing=document.getElementById('pwp'+id);
  var isNul=hv!==''&&av!==''&&+hv===+av;
  if(isNul&&!existing){
    var prDiv=document.getElementById('ph'+id);
    if(!prDiv)return;
    var container=prDiv.closest('.pr');
    if(!container)return;
    var div=document.createElement('div');
    div.style='display:flex;align-items:center;gap:6px;margin-top:4px';
    div.innerHTML='<span style="font-size:.7rem;color:var(--muted)">⚽ TAB:</span>'
      +'<select id="pwp'+id+'" style="flex:1;background:var(--bg);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;padding:3px 6px;font-size:.8rem">'
      +'<option value="">— Vainqueur aux TAB —</option>'
      +'<option value="h">⚽ '+m.h+'</option>'
      +'<option value="a">⚽ '+m.a+'</option>'
      +'</select>';
    container.parentNode.insertBefore(div,container.nextSibling);
  }else if(!isNul&&existing){
    existing.parentNode.remove();
  }
}

function selectCustomAvatar(val,prefix){
  prefix=prefix||'reg';
  val=(val||'').trim();
  if(!val)return;
  // Ne garde que le 1er caractère "visuel" (grapheme) même si un emoji composé
  // (drapeau, peau, ZWJ...) tient sur plusieurs code points, pour rester compact.
  var first=val;
  try{
    if(typeof Intl!=='undefined'&&Intl.Segmenter){
      var seg=Array.from(new Intl.Segmenter().segment(val)).map(function(s){return s.segment;});
      if(seg[0])first=seg[0];
    }else{
      var arr=Array.from(val);if(arr[0])first=arr[0];
    }
  }catch(e){}
  var inp=document.getElementById('sel-avatar-'+prefix);if(inp)inp.value=first;
  var pv=document.getElementById('custom-avatar-preview-'+prefix);if(pv)pv.textContent=first;
  document.querySelectorAll('.av-btn-'+prefix).forEach(function(b){b.style.borderColor='var(--bdr)';b.style.background='var(--bg)';});
}

function fileToBase64(file){
  return new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onload=function(){var res=reader.result;var b64=res.split(',')[1];resolve({b64:b64,type:file.type});};
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}
async function hUploadLogos(){
  if(!SESSION_PIN){toast('Mode admin non activé','err');return;}
  var e=document.getElementById('logo-err');if(e)e.textContent='';
  var clubInp=document.getElementById('logo-club-file'),ldcInp=document.getElementById('logo-ldc-file');
  var jobs=[];
  if(clubInp&&clubInp.files&&clubInp.files[0])jobs.push({key:'club',file:clubInp.files[0]});
  if(ldcInp&&ldcInp.files&&ldcInp.files[0])jobs.push({key:'ldc',file:ldcInp.files[0]});
  if(!jobs.length){if(e)e.textContent='Choisis au moins un fichier.';return;}
  for(var i=0;i<jobs.length;i++){
    var job=jobs[i];
    if(job.file.size>1024*1024){if(e)e.textContent='"'+job.file.name+'" dépasse 1 Mo.';return;}
    var enc=await fileToBase64(job.file);
    var r=await secureCall('adminUploadLogo',{pin:SESSION_PIN,logoKey:job.key,fileBase64:enc.b64,contentType:enc.type});
    if(!r.ok){if(e)e.textContent=r.msg||'Erreur upload '+job.key;return;}
    DB.assets=DB.assets||{};DB.assets['logo_'+job.key]=r.url;
  }
  toast('Logo(s) mis à jour ✓');
  render();
}

function countdown(dt,ti){var kickoff=matchKickoff(dt,ti),diff=kickoff-new Date();if(diff<=0)return '';var h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);var cls=h<2?'hot':h<12?'warm':'ok';var label=h===0?m+'min':h<24?h+'h'+(m>0?m+'min':''):Math.floor(h/24)+'j';return '<span class="cd '+cls+'">&#9201; '+label+'</span>';}
function pendingCount(){if(!S.user||S.user===ADMIN)return 0;var pr=uPronos(S.user),n=0;for(var i=0;i<M.length;i++){var m=M[i];if(new Date().getTime()<matchKickoff(m.dt,m.ti)&&!pr[m.id])n++;}return n;}
function getMatchesPendingSync(){var now=new Date(),pending=[];for(var i=0;i<M.length;i++){var m=M[i];if(DB.results[m.id])continue;if(now.getTime()>=matchKickoff(m.dt,m.ti)+2*60*60*1000)pending.push(m);}return pending;}

async function autoFetch(silent){
  if(!silent){
    toast('Synchronisation scores lancée...');
    var e=document.getElementById('synce');
    try{
      var resp=await fetch(SUPABASE_URL+'/functions/v1/sync-scores?force=1',{method:'POST'});
      var data=await resp.json();
      if(!resp.ok){
        var msg='Erreur sync-scores ('+resp.status+'): '+(data.error||JSON.stringify(data));
        toast(msg,'err');
        if(e){e.textContent=msg;e.style.color='var(--red)';}
        return;
      }
      await loadAll();render();
      var okMsg='Scores : '+(data.updated||0)+' match(s) mis à jour'
        +(data.penalties?', dont '+data.penalties+' TAB ⚽':'')+', '+(data.notFound||0)+' non trouvé(s)';
      toast(okMsg+' ✓');
      if(e){e.textContent=okMsg;e.style.color='var(--grn)';}
    }catch(err){
      toast('Erreur réseau sync-scores: '+err.message,'err');
      if(e){e.textContent='Erreur réseau: '+err.message;e.style.color='var(--red)';}
    }
  }else{await loadAll();if(S.page==='classement'||S.page==='accueil')render();}
}
async function autoFetchOdds(){
  toast('Synchronisation cotes lancée...');
  var e=document.getElementById('oddse');
  try{
    var resp=await fetch(SUPABASE_URL+'/functions/v1/sync-odds?force=1',{method:'POST'});
    var data=await resp.json();
    if(!resp.ok){
      var msg='Erreur sync-odds ('+resp.status+'): '+(data.error||JSON.stringify(data));
      toast(msg,'err');
      if(e){e.textContent=msg;e.style.color='var(--red)';}
      return;
    }
    await loadAll();render();
    var okMsg='Cotes : '+(data.updated||0)+' match(s) mis à jour ('+(data.provider||'?')+')';
    toast(okMsg+' ✓');
    if(e){e.textContent=okMsg;e.style.color='var(--grn)';}
  }catch(err){
    toast('Erreur réseau sync-odds: '+err.message,'err');
    if(e){e.textContent='Erreur réseau: '+err.message;e.style.color='var(--red)';}
  }
}

async function hSaveAll(){
  if(!S.user||S.user===ADMIN||!sb)return;
  var uu=DB.userMap[S.user];if(!uu){toast('Session expirée','err');return;}
  var uid=uu.id,records=[],saved=0;
  for(var mi=0;mi<M.length;mi++){
    var m=M[mi];
    var hEl=document.getElementById('ph'+m.id),aEl=document.getElementById('pa'+m.id);
    if(!hEl||!aEl||hEl.value===''||aEl.value==='')continue;
    if(hEl.disabled||aEl.disabled)continue;
    var wpEl=document.getElementById('pwp'+m.id);
    var wp=wpEl?wpEl.value||null:null;
    records.push({user_id:uid,match_id:m.id,home_score:+hEl.value,away_score:+aEl.value,winner_prono:wp,updated_at:new Date().toISOString()});
    if(!DB.pronos[S.user])DB.pronos[S.user]={};
    DB.pronos[S.user][m.id]={h:+hEl.value,a:+aEl.value,wp:wp};
    saved++;
  }
  if(!records.length){toast('Aucun pronostic à sauvegarder','info');return;}
  try{
    var resp=await fetch(SUPABASE_URL+'/rest/v1/pronos?on_conflict=user_id,match_id',{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(records)});
    if(resp.ok||resp.status===201||resp.status===204){toast(saved+' pronostic(s) sauvegardé(s) ✓');render();}
    else{var txt=await resp.text();toast('Erreur ('+resp.status+'): '+txt,'err');}
  }catch(e){toast('Erreur réseau: '+e.message,'err');}
}
function updatePronoCount(){var cnt=document.getElementById('prono-count');if(!cnt)return;var n=0;for(var mi=0;mi<M.length;mi++){var hEl=document.getElementById('ph'+M[mi].id),aEl=document.getElementById('pa'+M[mi].id);if(hEl&&aEl&&!hEl.disabled&&hEl.value!==''&&aEl.value!=='')n++;}cnt.textContent=n;}

function logoClick(){
  logoClicks++;
  if(logoTimer)clearTimeout(logoTimer);
  if(logoClicks>=5){
    logoClicks=0;
    document.getElementById('emergency-modal').style.display='flex';
    return;
  }
  // On attend un court instant avant d'agir, pour laisser le temps à
  // d'éventuels clics suivants d'atteindre le seuil des 5 (mode secours).
  // Si un seul clic est resté isolé passé ce délai → retour à la racine.
  logoTimer=setTimeout(function(){
    var isolatedClick=(logoClicks===1);
    logoClicks=0;
    if(isolatedClick){
      window.location.href=window.location.origin+window.location.pathname;
    }
  },600);
}

async function doEmergency(){
  var sec=gv('em-secret'),np=gv('em-np'),npin=gv('em-npin'),emsg=document.getElementById('em-msg');
  var r=await secureCall('emergencyReset',{secretCode:sec,newPassword:np,newPin:npin});
  if(!r.ok){if(emsg){emsg.textContent=r.msg||'Code secret incorrect.';emsg.style.color='var(--red)';}return;}
  if(emsg){emsg.textContent='Réinitialisation effectuée !';emsg.style.color='var(--grn)';}
  setTimeout(function(){document.getElementById('emergency-modal').style.display='none';},2000);
}

/* ═══ CHARGEMENT ════════════════════════════════════════════════ */
async function loadAll(){
  if(!sb)return;
  try{
    var loggedSes=localStorage.getItem('ldc_ses');
    var isAdminSession=(loggedSes===ADMIN);
    var rU,rUg=null,rUses=null;
    if(GROUP_ID&&!isAdminSession){
      rU=await sb.from('users').select(USERS_SAFE_COLS).eq('pseudo_key',ADMIN);
      rUg=await sb.from('users').select(USERS_SAFE_COLS).eq('group_id',GROUP_ID);
      if(loggedSes&&loggedSes!==ADMIN)rUses=await sb.from('users').select(USERS_SAFE_COLS).eq('pseudo_key',loggedSes).eq('group_id',GROUP_ID);
    }else{rU=await sb.from('users').select(USERS_SAFE_COLS);}
    var rP=await sb.from('pronos').select('*');
    var rR=await sb.from('results').select('*');
    var rG=await sb.from('groups').select('*').order('created_at');
    var rCF=await sb.from('confrontations').select('*').order('created_at');
    var rCFG=await sb.from('confrontation_groups').select('*');
    var users=rU.data||[];
    var seenIds={};users.forEach(function(u){seenIds[u.id]=true;});
    if(rUg&&rUg.data)rUg.data.forEach(function(u){if(!seenIds[u.id]){users.push(u);seenIds[u.id]=true;}});
    if(rUses&&rUses.data)rUses.data.forEach(function(u){if(!seenIds[u.id]&&(!GROUP_ID||u.group_id===GROUP_ID)){users.push(u);seenIds[u.id]=true;}});
    var pronos=rP.data||[];var results=rR.data||[];
    DB.groups=rG.data||[];
    DB.confrontations=rCF.data||[];
    DB.confrontationGroups=rCFG.data||[];
    if(GROUP_ID&&!isAdminSession){var gids=users.map(function(u){return u.id;});pronos=pronos.filter(function(p){return gids.indexOf(p.user_id)>-1;});}
    DB.users=[];DB.userMap={};
    for(var i=0;i<users.length;i++){DB.users.push(users[i]);DB.userMap[users[i].pseudo_key]=users[i];}
    DB.pronos={};
    for(var i=0;i<users.length;i++){var u_=users[i];DB.pronos[u_.id]={};DB.pronos[u_.pseudo_key]=DB.pronos[u_.id];}
    var knownIds={};for(var j=0;j<users.length;j++)knownIds[users[j].id]=users[j];
    for(var i=0;i<pronos.length;i++){var p=pronos[i],owner=knownIds[p.user_id];if(owner){if(!DB.pronos[owner.id])DB.pronos[owner.id]={};DB.pronos[owner.id][p.match_id]={h:p.home_score,a:p.away_score,wp:p.winner_prono||null};if(!DB.pronos[owner.pseudo_key]||DB.userMap[owner.pseudo_key]&&DB.userMap[owner.pseudo_key].id===owner.id)DB.pronos[owner.pseudo_key]=DB.pronos[owner.id];}}
    DB.results={};for(var i=0;i<results.length;i++)DB.results[results[i].match_id]={h:results[i].home_score,a:results[i].away_score};
    // NB : le PIN admin et le code de secours ne sont plus jamais lus
    // côté client (table config verrouillée par RLS) — voir secure-actions.
    var rM=await sb.from('matches').select('*').order('id');
    if(rM.data&&rM.data.length>0){M=rM.data.map(function(r){return{id:r.id,ph:r.phase,gr:r.grp,dt:r.dt,ti:r.ti,h:r.home,a:r.away,v:r.venue,oh:r.odds_h?+r.odds_h:null,oa:r.odds_a?+r.odds_a:null,od:r.odds_d?+r.odds_d:null,win:r.winner||null};});}
    // Jokers déjà résolus (match joué) — publics via RLS, utilisés pour
    // ajuster le classement de tout le monde, pas seulement le joueur connecté.
    var rJ=await sb.from('jokers_inventory').select('user_id,match_id,bonus_points').eq('resolved',true);
    DB_JOKERS_RESOLVED={};
    (rJ.data||[]).forEach(function(j){
      if(!DB_JOKERS_RESOLVED[j.user_id])DB_JOKERS_RESOLVED[j.user_id]={};
      DB_JOKERS_RESOLVED[j.user_id][j.match_id]=(DB_JOKERS_RESOLVED[j.user_id][j.match_id]||0)+(+j.bonus_points||0);
    });
    // Logos du site (LDC + club), publics
    var rSA=await sb.from('site_assets').select('*');
    (rSA.data||[]).forEach(function(a){DB.assets=DB.assets||{};DB.assets[a.key]=a.url;});
    renderLogos();
  }catch(e){toast('Erreur chargement: '+e.message,'err');}
}

async function reloadPronos(){
  if(!sb)return;
  var r=await sb.from('pronos').select('*');var pronos=r.data||[];
  var knownIds={};for(var j=0;j<DB.users.length;j++)knownIds[DB.users[j].id]=DB.users[j];
  for(var k in DB.pronos)DB.pronos[k]={};
  for(var i=0;i<pronos.length;i++){var p=pronos[i],owner=knownIds[p.user_id];if(owner){if(!DB.pronos[owner.pseudo_key])DB.pronos[owner.pseudo_key]={};DB.pronos[owner.pseudo_key][p.match_id]={h:p.home_score,a:p.away_score,wp:p.winner_prono||null};}}
}

// Realtime actif seulement si : admin connecté OU un match est en cours
// (coup d'envoi passé) et son score n'est pas encore tombé. Évite de garder
// une connexion Realtime ouverte pour chaque visiteur en dehors des matchs.
var LIVE_WINDOW_MS=3.5*60*60*1000; // 90min + prolongations + TAB + marge
function isMatchLiveWindow(){
  var now=Date.now();
  for(var i=0;i<M.length;i++){
    var m=M[i];
    if(!m.dt||!m.ti)continue;
    var kickoff=matchKickoff(m.dt,m.ti);
    if(isNaN(kickoff))continue;
    if(now>=kickoff&&now<=kickoff+LIVE_WINDOW_MS&&!DB.results[m.id])return true;
  }
  return false;
}
var rtDesired=null;
function syncRealtimeState(){
  if(!sb||!sb._realtimeConnect)return;
  var shouldBeLive=isAdmin()||isMatchLiveWindow();
  if(shouldBeLive===rtDesired)return;
  rtDesired=shouldBeLive;
  if(shouldBeLive)sb._realtimeConnect();
  else sb._realtimeDisconnect();
}
setInterval(syncRealtimeState,60000); // ré-évalue chaque minute

function setupRealtime(){
  if(!sb)return;
  try{
    sb.channel('db-live-ldc')
      .on('postgres_changes',{event:'*',schema:'public',table:'results'},function(payload){
        setTimeout(async function(){
          if(payload.eventType==='DELETE'){
            delete DB.results[payload.old.match_id];
          } else {
            var mid=payload.new.match_id;
            DB.results[mid]={h:payload.new.home_score,a:payload.new.away_score};
            if(!isAdmin())toast('Score mis à jour ! ⚡');
            // Propagation uniquement si admin connecté (droits d'écriture Supabase)
            // et uniquement si ce match est dans le bracket KO
            // Pour les TAB : getWinner peut retourner null si matches.winner
            // n'est pas encore mis à jour → la propagation TAB se fait dans
            // le listener matches UPDATE ci-dessous
            if(isAdmin()&&BRACKET_NEXT[+mid]){
              var w=getWinner(+mid);
              if(w)await propagateMatch(+mid);
            }
          }
          render();
        },0);
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'pronos'},function(){
        setTimeout(function(){reloadPronos().then(function(){if(S.page==='classement'||S.page==='accueil')render();});},0);
      })
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'matches'},function(payload){
        setTimeout(async function(){
          var d=payload.new;if(!d||!d.id)return;
          // Mettre à jour M[] localement
          for(var i=0;i<M.length;i++){
            if(M[i].id===d.id){
              if(d.home!==undefined) M[i].h=d.home;
              if(d.away!==undefined) M[i].a=d.away;
              if(d.odds_h!==undefined) M[i].oh=d.odds_h?+d.odds_h:null;
              if(d.odds_a!==undefined) M[i].oa=d.odds_a?+d.odds_a:null;
              if(d.odds_d!==undefined) M[i].od=d.odds_d?+d.odds_d:null;
              if(d.winner!==undefined) M[i].win=d.winner||null;
              break;
            }
          }
          // Propagation TAB : quand sync-scores met à jour matches.winner
          // (arrive après la mise à jour de results → cas TAB couvert ici)
          if(isAdmin()&&d.winner&&BRACKET_NEXT[+d.id]){
            var w2=getWinner(+d.id);
            if(w2)await propagateMatch(+d.id);
          }
          render();
        },0);
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'confrontations'},function(){
        setTimeout(async function(){
          var rCF=await sb.from('confrontations').select('*').order('created_at');
          DB.confrontations=rCF.data||[];
          render();
        },0);
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'confrontation_groups'},function(){
        setTimeout(async function(){
          var rCFG=await sb.from('confrontation_groups').select('*');
          DB.confrontationGroups=rCFG.data||[];
          render();
        },0);
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'users'},function(){
        setTimeout(async function(){
          // Recharger les users visibles (propre groupe + admin)
          var rU2=await sb.from('users').select(USERS_SAFE_COLS);
          if(rU2.data){
            DB.users=[];DB.userMap={};
            rU2.data.forEach(function(u){DB.users.push(u);DB.userMap[u.pseudo_key]=u;});
          }
          render();
        },0);
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'groups'},function(){
        setTimeout(async function(){
          var rG2=await sb.from('groups').select('*').order('created_at');
          DB.groups=rG2.data||[];
          render();
        },0);
      })
      .subscribe();
  }catch(e){console.warn('Realtime:',e.message);}
}

if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(regs){regs.forEach(function(r){r.unregister();});});if('caches' in window)caches.keys().then(function(keys){keys.forEach(function(k){caches.delete(k);});});}

async function init(){
  document.getElementById('main').innerHTML='<div class="loading-wrap"><div class="spinner"></div></div>';
  if(!initSB()){render();return;}
  try{await loadAll();}catch(e){console.error('loadAll:',e);toast('Erreur: '+e.message,'err');}
  var ses=localStorage.getItem('ldc_ses');
  var sesGrp=localStorage.getItem('ldc_grp')||'';
  if(ses&&ses!==ADMIN&&GROUP_ID&&sesGrp!==GROUP_ID){localStorage.removeItem('ldc_ses');localStorage.removeItem('ldc_grp');ses=null;}
  if(ses&&DB.userMap[ses])S.user=ses;
  if(!GROUP_ID&&S.user&&S.user!==ADMIN){var udataR=DB.userMap[S.user];if(udataR&&udataR.group_id){window.location.replace(window.location.pathname+'?g='+udataR.group_id);return;}}
  try{setupRealtime();syncRealtimeState();}catch(e){console.warn('Realtime:',e);}
  // Mécanisme 3 : si l'admin était déjà connecté (session restaurée) →
  // propager silencieusement les qualifiés manquants au démarrage
  if(isAdmin())setTimeout(async function(){var n=await propagateAllWinners();if(n>0)toast(n+' qualifié(s) propagé(s) automatiquement ✓');},1000);
  var _pg=localStorage.getItem('ldc_pg'),_tb=localStorage.getItem('ldc_tab');
  if(_pg&&['accueil','matchs','classement','ligue','tableau','profil','reglement','stats'].indexOf(_pg)!==-1){if(_pg==='stats'&&!isAdmin())_pg='accueil';S.page=_pg;}
  if(_tb)S.tab=_tb;
  render();
}
init();
